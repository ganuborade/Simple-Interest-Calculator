<!DOCTYPE html>
<html lang="en-in">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Interest Calculator</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            height: 100vh;
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: #fff;
            padding: 30px 25px;
            border-radius: 15px;
            width: 320px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            text-align: center;
        }

        h1 {
            font-size: 18px;
            color: #555;
            margin-bottom: 5px;
        }

        h2 {
            margin-bottom: 20px;
            color: #222;
        }

        label {
            display: block;
            text-align: left;
            font-size: 14px;
            margin-top: 10px;
            color: #555;
        }

        .input-box {
            position: relative;
        }

        .input-box i {
            position: absolute;
            left: 10px;
            top: 12px;
            color: #888;
        }

        input {
            width: 100%;
            padding: 10px 10px 10px 35px;
            margin-top: 5px;
            border-radius: 8px;
            border: 1px solid #ccc;
            outline: none;
            transition: 0.3s;
        }

        input:focus {
            border-color: #4facfe;
            box-shadow: 0 0 5px rgba(79,172,254,0.5);
        }

        button {
            width: 100%;
            margin-top: 20px;
            padding: 10px;
            border: none;
            border-radius: 8px;
            background: #4facfe;
            color: #fff;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #007bff;
        }

        #result {
            margin-top: 20px;
            font-weight: 600;
            color: #333;
            background: #f1f9ff;
            padding: 10px;
            border-radius: 8px;
            display: none;
        }

        footer {
            margin-top: 15px;
            font-size: 12px;
            color: #888;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>MADE IN INDIA</h1>
    <h2><i class="bi bi-calculator"></i> Simple Interest</h2>

    <label>Principal Amount (₹)</label>
    <div class="input-box">
        <i class="bi bi-currency-rupee"></i>
        <input type="number" id="principal" placeholder="Enter amount">
    </div>

    <label>Interest Rate (%)</label>
    <div class="input-box">
        <i class="bi bi-percent"></i>
        <input type="number" id="rate" placeholder="Enter rate">
    </div>

    <label>Time (Years)</label>
    <div class="input-box">
        <i class="bi bi-clock"></i>
        <input type="number" id="time" placeholder="Enter years">
    </div>

    <button onclick="calculateSI()">
        <i class="bi bi-lightning-charge"></i> Calculate
    </button>

    <div id="result"></div>

    <footer>Made with ❤️ by My Village team</footer>
</div>

<script>
function calculateSI() {
    let p = document.getElementById("principal").value;
    let r = document.getElementById("rate").value;
    let t = document.getElementById("time").value;

    if(p === "" || r === "" || t === "") {
        alert("Please fill all fields!");
        return;
    }

    let si = (p * r * t) / 100;

    let resultDiv = document.getElementById("result");
    resultDiv.style.display = "block";
    resultDiv.innerHTML = `Simple Interest = ₹ ${si}`;
}
</script>

</body>
</html>
