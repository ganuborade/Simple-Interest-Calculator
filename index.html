<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Simple Interest Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>My Village</h1>
    <h2>Simple Interest Calculator By GB</h2>

    <label>Principal Amount (₹)</label>
    <input type="number" id="principal" placeholder="Enter principal amount">

    <label>Interest Rate (%)</label>
    <input type="number" id="rate" placeholder="Enter interest rate">

    <label>Time (Years)</label>
    <input type="number" id="time" placeholder="Enter time in years">

    <button onclick="calculateSI()">Calculate</button>

    <div id="result"></div>
</div>

<script src="script.js"></script>

</body>

</html>
